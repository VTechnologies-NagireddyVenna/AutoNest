server:
  port: 8080
  servlet:
    context-path: /autonest

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/autonest_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      fail-on-empty-beans: false

app:
  cors:
    allowed-origins: http://localhost:5173