server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://<DB_SERVER_IP>:3306/autonest_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: autonest_user
    password: CHANGE_ME
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  jackson:
    serialization:
      fail-on-empty-beans: false

app:
  cors:
    allowed-origins: http://<APP_SERVER_IP>
